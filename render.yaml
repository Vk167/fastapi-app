version: "1"
projects:
- name: My project
  environments:
  - name: Production
    services:
    - type: web
      name: fastapi-app
      runtime: python
      repo: https://github.com/Vk167/fastapi-app
      plan: free
      envVars:
      - key: IMAGEKIT_URL
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      region: oregon
      buildCommand: uv sync --frozen && uv cache prune --ci
      startCommand: uvicorn app.app:app --host 0.0.0.0 --port $PORT
      autoDeployTrigger: commit
      buildFilter:
        ignoredPaths:
        - fastapi-app/blob/main/main.py
